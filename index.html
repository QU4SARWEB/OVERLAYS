<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0d0b1a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;padding:2rem}
  h1{font-size:2rem;background:linear-gradient(135deg,#a855f7,#eab308);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;max-width:900px;width:100%}

  .card.gold{background:rgba(234,179,8,0.12);border-color:rgba(234,179,8,0.25)}
  .card .icon{font-size:1.5rem;display:block;margin-bottom:6px}
  .card small{display:block;font-size:.75rem;color:rgba(255,255,255,0.35);font-weight:400;margin-top:4px}
  .section-title{color:rgba(255,255,255,0.3);font-size:.8rem;text-transform:uppercase;letter-spacing:2px;margin-top:1rem}
  p{color:#888;font-size:.8rem}
  p a{color:#a855f7}
  @media(max-width:600px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
