<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QU4SAR Scoreboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#0d0b1a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem}
  h1{font-size:2rem;background:linear-gradient(135deg,#a855f7,#eab308);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .links{display:flex;gap:2rem}
  .links a{padding:.8rem 2rem;border-radius:12px;text-decoration:none;font-weight:600;transition:.2s}
  .overlay-link{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
  .admin-link{background:linear-gradient(135deg,#eab308,#f59e0b);color:#000}
  .links a:hover{transform:scale(1.05);filter:brightness(1.1)}
  p{color:#888;font-size:.85rem}
  p a{color:#a855f7}
</style>
</head>
<body>
<h1>QU4SAR Scoreboard</h1>
<div class="links">
  <a class="overlay-link" href="overlay.html" target="_blank">Overlay</a>
  <a class="admin-link" href="admin.html" target="_blank">Admin Panel</a>
</div>
<p><a href="https://github.com/QU4SARWEB/OVERLAYS" target="_blank">GitHub</a></p>
</body>
</html>
