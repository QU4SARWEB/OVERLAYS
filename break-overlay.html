<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QU4SAR — Break Screen</title>
<style>
body{background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:'Segoe UI',sans-serif}
.brk-wrap{text-align:center;padding:50px 80px;background:rgba(8,0,24,0.9);border:1px solid rgba(187,134,252,0.2);border-radius:24px;backdrop-filter:blur(16px);transition:all .5s;max-width:700px;width:100%}
.brk-wrap.hidden{opacity:0;transform:scale(0.9)}
.brk-title{font-size:48px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.2}
.brk-subtitle{font-size:20px;color:rgba(255,255,255,0.4);margin-bottom:30px}
.brk-timer{font-size:72px;font-weight:700;font-variant-numeric:tabular-nums;color:#BB86FC;text-shadow:0 0 60px rgba(187,134,252,0.2)}
.brk-label{font-size:14px;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:3px;margin-top:8px}
</style>
</head>
<body>
<div class="brk-wrap hidden" id="brkWrap">
  <div class="brk-title" id="brkTitle"></div>
  <div class="brk-subtitle" id="brkSubtitle"></div>
  <div class="brk-timer" id="brkTimer">00:00</div>
  <div class="brk-label">REANUDANDO EN</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/break-overlay.js"></script>
</body>
</html>
