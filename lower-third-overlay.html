<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QU4SAR — Lower Third</title>
<style>
body{background:transparent;overflow:hidden;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
.lt-wrap{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;transition:all .5s cubic-bezier(.2,.9,.3,1.1)}
.lt-wrap.hidden{opacity:0;transform:translateX(-50%) translateY(40px)}
.lt-inner{display:inline-block;padding:14px 40px;background:rgba(8,0,24,0.92);border:1px solid rgba(187,134,252,0.3);border-radius:0 20px 20px 0;backdrop-filter:blur(12px);position:relative}
.lt-inner::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,#BB86FC,#FFD700)}
.lt-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:2px}
.lt-subtitle{font-size:14px;color:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<div class="lt-wrap hidden" id="ltWrap">
  <div class="lt-inner">
    <div class="lt-title" id="ltTitle"></div>
    <div class="lt-subtitle" id="ltSubtitle"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lower-third-overlay.js"></script>
</body>
</html>
