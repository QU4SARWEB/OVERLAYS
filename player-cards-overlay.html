<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QU4SAR — Player Cards</title>
<link rel="stylesheet" href="css/overlay.css">
<style>
body{background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:'Segoe UI',sans-serif;gap:60px}
.tm-col{display:flex;flex-direction:column;gap:8px}
.tm-header{text-align:center;font-size:20px;font-weight:700;color:#fff;padding:10px 20px;background:rgba(8,0,24,0.85);border-radius:14px;border:1px solid rgba(187,134,252,0.3);backdrop-filter:blur(12px);margin-bottom:4px}
.tm-header.t1{border-color:rgba(187,134,252,0.5)}
.tm-header.t2{border-color:rgba(231,76,60,0.5)}
.p-card{display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(8,0,24,0.75);border-radius:12px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(8px);min-width:320px;transition:all .3s}
.p-card .p-num{font-size:12px;color:rgba(255,255,255,0.3);min-width:18px;text-align:center}
.p-card .p-name{flex:1;font-size:15px;font-weight:600;color:#fff}
.p-card .p-stat{display:flex;gap:16px;font-size:13px;color:rgba(255,255,255,0.5)}
.p-card .p-stat span{min-width:32px;text-align:center}
.p-card .p-stat .k{color:#2ECC71}
.p-card .p-stat .d{color:#E74C3C}
.p-card .p-stat .a{color:#BB86FC}
.p-card .p-stat .a-val{color:#FFD700}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/player-cards-overlay.js"></script>
</body>
</html>
